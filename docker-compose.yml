services:
  openclaw:
    image: alpine/openclaw:latest
    hostname: openclaw
    container_name: openclaw
    restart: unless-stopped
    command:
      - sh
      - -lc
      - |
        node /app/openclaw.mjs models set openai-codex/gpt-5.3-codex >/dev/null 2>&1 || true
        node /app/openclaw.mjs config set --strict-json gateway.controlUi.allowedOrigins '["http://127.0.0.1:18789","http://localhost:18789"]' >/dev/null 2>&1 || true
        exec node /app/openclaw.mjs gateway --allow-unconfigured --bind lan --port 18789

    ports:
      - "127.0.0.1:18789:18789"
      - "127.0.0.1:18791:18791"

    volumes:
      - ./docker-data/openclaw:/home/openclaw/.openclaw
      - ./docker-data/codex:/home/openclaw/.codex

    environment:
      - HOME=/home/openclaw
      - PORT=18789
      - NODE_OPTIONS=--max-old-space-size=1024
      - TMPDIR=/tmp
      - XDG_CACHE_HOME=/tmp
      - XDG_CONFIG_HOME=/home/openclaw/.openclaw

    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:18789 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
