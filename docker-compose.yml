services:
  openclaw:
    image: openclawai/openclaw:la
    container_name: openclaw
    restart: unless-stopped

    ports:
      - "127.0.0.1:18789:18789"

    volumes:
      - ~/.openclaw-docker/openclaw:/home/openclaw/.openclaw
      - ~/.openclaw-docker/codex:/home/openclaw/.codex:ro

    environment:
      - HOME=/home/openclaw
      - PORT=18789
      - NODE_OPTIONS=--max-old-space-size=1024
      - TMPDIR=/tmp
      - XDG_CACHE_HOME=/tmp
      - XDG_CONFIG_HOME=/home/openclaw/.openclaw

    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:18789 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s